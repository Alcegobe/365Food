<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>365Food — Mes repas sains & gourmands</title>
  <meta name="description" content="Bibliothèque de recettes saines et gourmandes, adaptée à la Belgique et aux saisons, + assistant fast-food / resto." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-emoji">🍔</span>
      <div>
        <h1>365Food</h1>
        <p class="tagline">Manger sain sans avoir l'impression de se priver</p>
      </div>
    </div>
    <nav class="tabs" role="tablist" aria-label="Vue">
      <button class="tab" id="tab-recettes" data-view="recettes" role="tab" aria-selected="true">🍳 Recettes</button>
      <button class="tab" id="tab-semaine" data-view="semaine" role="tab" aria-selected="false">📅 Semaine</button>
      <button class="tab" id="tab-courses" data-view="courses" role="tab" aria-selected="false">🛒 Courses</button>
      <button class="tab" id="tab-resto" data-view="resto" role="tab" aria-selected="false">🍔 Dehors</button>
    </nav>
  </header>

  <!-- VUE RECETTES -->
  <div id="view-recettes" class="view">
    <div class="searchbar">
      <input id="search" type="search" placeholder="Rechercher un plat, une sauce…" autocomplete="off" aria-label="Rechercher une recette" />
    </div>
    <nav class="filters" aria-label="Filtres">
      <div class="filter-group" id="repas-filter" role="group" aria-label="Type de repas"></div>
      <div class="filter-row">
        <label class="season-select">
          Saison
          <select id="season-filter" aria-label="Saison"></select>
        </label>
        <span id="count" class="count" aria-live="polite"></span>
      </div>
    </nav>
    <main id="results" class="results"><p class="loading">Chargement des recettes…</p></main>
  </div>

  <!-- VUE MA SEMAINE -->
  <div id="view-semaine" class="view" hidden>
    <div class="semaine-bar">
      <div class="semaine-info" id="semaine-info"></div>
      <div class="semaine-actions">
        <label class="seasonal-toggle"><input type="checkbox" id="semaine-seasonal" checked /> De saison</label>
        <label class="seasonal-toggle"><input type="checkbox" id="semaine-detail" /> Recettes détaillées</label>
        <button id="semaine-regen" class="btn" type="button">🎲 Régénérer</button>
        <button id="semaine-copy" class="btn ghost" type="button">📋 Copier</button>
      </div>
    </div>
    <main id="semaine" class="results"><p class="loading">Chargement…</p></main>
  </div>

  <!-- VUE COURSES -->
  <div id="view-courses" class="view" hidden>
    <div class="semaine-bar">
      <div class="semaine-info" id="courses-info"></div>
      <div class="semaine-actions">
        <span class="seasonal-toggle">Liste de la semaine en cours</span>
        <button id="courses-copy" class="btn ghost" type="button">📋 Copier</button>
        <button id="courses-reset" class="btn ghost" type="button">↺ Décocher</button>
      </div>
    </div>
    <main id="courses" class="results"><p class="loading">Chargement…</p></main>
  </div>

  <!-- VUE MANGER DEHORS -->
  <div id="view-resto" class="view" hidden>
    <div class="searchbar">
      <input id="resto-search" type="search" placeholder="Burger King, kebab, sushi, italien…" autocomplete="off" aria-label="Rechercher une enseigne" />
    </div>
    <main id="resto" class="results"><p class="loading">Chargement…</p></main>
  </div>

  <footer class="app-footer">
    <span id="install-hint"></span>
    <span>Belgique 🇧🇪 · de saison · objectif athlétique</span>
  </footer>

  <script src="./app.js" type="module"></script>
</body>
</html>
