name: Déployer la PWA sur GitHub Pages

# Le déploiement GitHub Pages n'est autorisé que depuis la branche par défaut
# du dépôt. On ne déclenche donc le workflow que sur cette branche, sinon les
# autres branches (ex. main) produisent des runs rejetés par la gate
# d'environnement « github-pages ».
on:
  push:
    branches: ["claude/meal-planning-pwa-j947zv"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Uploader le site (racine du repo)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
